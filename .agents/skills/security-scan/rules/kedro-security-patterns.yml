# requires semgrep >= 1.45.0 (taint mode + focus-metavariable)
rules:
  - id: kedro-dynamic-import
    message: >-
      importlib.import_module() is called with a dynamic argument. In Kedro,
      module paths often originate from catalog.yml or other config, which is
      the code-vs-data boundary. Verify the argument cannot be influenced by
      untrusted external input.
    languages: [python]
    severity: WARNING
    metadata:
      category: security
      confidence: MEDIUM
      impact: HIGH
    patterns:
      - pattern: importlib.import_module($X)
      - pattern-not: importlib.import_module("...")

  - id: kedro-yaml-unsafe-load
    message: >-
      yaml.load() without a safe Loader can deserialise arbitrary Python
      objects. Kedro config files are user-controlled data; prefer
      yaml.safe_load() or pass Loader=yaml.SafeLoader explicitly.
    languages: [python]
    severity: WARNING
    metadata:
      category: security
      confidence: HIGH
      impact: HIGH
    patterns:
      - pattern: yaml.load(...)
      - pattern-not: yaml.load(..., Loader=yaml.SafeLoader, ...)
      - pattern-not: yaml.load(..., Loader=yaml.CSafeLoader, ...)
      - pattern-not: yaml.load(..., yaml.SafeLoader, ...)
      - pattern-not: yaml.load(..., yaml.CSafeLoader, ...)

  - id: kedro-taint-string-param-to-path
    message: >-
      A str-annotated parameter flows into a pathlib path construction without
      traversal sanitization. If this parameter originates from user-supplied
      input (CLI flags, catalog config, API params), '../' sequences can escape
      the intended directory. Validate that the value contains no '..' or
      absolute path segments before using it as a path component. Note: only
      explicitly str-annotated parameters are tracked to limit noise; untyped
      parameters require manual review.
    mode: taint
    languages: [python]
    severity: WARNING
    metadata:
      category: security
      confidence: MEDIUM
      impact: HIGH
    pattern-sources:
      - patterns:
          - pattern-inside: |
              def $FUNC(..., $ARG: str, ...):
                  ...
          - focus-metavariable: $ARG
    pattern-sinks:
      - pattern: $BASE / $SINK
      - pattern: pathlib.Path(..., $SINK, ...)
      - pattern: pathlib.PurePosixPath(..., $SINK, ...)
    pattern-sanitizers:
      - pattern: |
          if ".." in $SINK:
              ...
      - pattern: |
          if ".." in str($SINK):
              ...
      - pattern: re.match(..., $SINK)
      - pattern: |
          if os.path.isabs($SINK):
              ...
      - pattern: |
          if not os.path.isabs($SINK):
              ...
      - pattern: |
          if pathlib.Path($SINK).is_absolute():
              ...
      - pattern: |
          if not pathlib.Path($SINK).is_absolute():
              ...
      - pattern: |
          if $SINK.startswith(...):
              ...

  - id: kedro-taint-config-to-callable-sink
    message: >-
      A value loaded from an environment variable or config file flows into a
      function that can interpret data as executable callables. In Python, several
      functions treat special keys (e.g. '()' in logging.config.dictConfig, Python
      object tags in yaml.load, __reduce__ in pickle) as callable factories,
      enabling RCE if the input is user-controlled. Validate or sanitize the
      config dict before passing it to any such sink.
    mode: taint
    languages: [python]
    severity: ERROR
    metadata:
      category: security
      confidence: HIGH
      impact: CRITICAL
    pattern-sources:
      - pattern: os.environ.get(...)
      - pattern: os.environ[...]
      - pattern: os.getenv(...)
      - pattern: yaml.safe_load(...)
      - pattern: yaml.load(...)
      - pattern: json.load(...)
      - pattern: json.loads(...)
    pattern-sinks:
      - pattern: logging.config.dictConfig($SINK)
      - pattern: logging.config.fileConfig($SINK)
      - pattern: pickle.loads($SINK)
      - pattern: marshal.loads($SINK)
      - pattern: eval($SINK)
      - pattern: exec($SINK)
    pattern-sanitizers:
      - pattern: |
          if "()" in $SINK:
              ...
      - pattern: |
          if "()" in str($SINK):
              ...

  - id: kedro-subprocess-shell-injection
    message: >-
      subprocess is called with shell=True and a non-literal command. If the
      command string originates from config, environment variables, or CLI
      arguments, an attacker who controls that value can execute arbitrary shell
      commands. Kedro framework code should avoid shell=True with non-literal
      commands; prefer shell=False with an explicit argument list, or validate
      and allowlist the command before use.
    languages: [python]
    severity: ERROR
    metadata:
      category: security
      confidence: HIGH
      impact: CRITICAL
    patterns:
      - pattern: subprocess.$FUNC($CMD, ..., shell=True, ...)
      - pattern-not: subprocess.$FUNC("...", ..., shell=True, ...)
      - pattern-not: subprocess.$FUNC([...], ..., shell=True, ...)
